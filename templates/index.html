<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DisasterAI</title>

    <!-- Load Inter from Google Fonts so the whole interface uses a clean sans-serif font. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Reset the box model so padding and borders are easier to reason about. */
        * {
            box-sizing: border-box;
        }

        /* Remove default spacing and allow the layout to fill the full browser height. */
        html,
        body {
            height: 100%;
            margin: 0;
        }

        /* Define the page colors, font, and vertical structure for the whole application. */
        body {
            background-color: #0f1115;
            color: #e5e7eb;
            display: flex;
            flex-direction: column;
            font-family: "Inter", sans-serif;
        }

        /* Keep the chat centered and prevent it from becoming too wide on large screens. */
        .app-shell {
            display: flex;
            flex: 1;
            flex-direction: column;
            margin-left: auto;
            margin-right: auto;
            max-width: 960px;
            width: 100%;
        }

        /* Add a simple top bar to label the application without any decorative effects. */
        .site-header {
            border-bottom: 1px solid #262b35;
            padding: 1rem 1.25rem;
        }

        /* Make the product name readable and slightly stronger than the surrounding text. */
        .app-title {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0;
        }

        /* Use a softer text color for the short supporting description. */
        .app-subtitle {
            color: #9ca3af;
            margin: 0.35rem 0 0;
        }

        /* Let the main content area grow so the message history can take up remaining space. */
        main {
            display: flex;
            flex: 1;
            flex-direction: column;
            min-height: 0;
        }

        /* This is the scrollable area that stores all user and assistant messages. */
        .chat-log {
            display: flex;
            flex: 1;
            flex-direction: column;
            gap: 1rem;
            min-height: 0;
            overflow-y: auto;
            padding: 1.25rem;
        }

        /* Each message row is a flex container so we can align user and assistant bubbles differently. */
        .message-row {
            display: flex;
            width: 100%;
        }

        /* User messages sit on the right side of the conversation. */
        .message-row.user {
            justify-content: flex-end;
        }

        /* Assistant messages sit on the left side of the conversation. */
        .message-row.assistant {
            justify-content: flex-start;
        }

        /* This is the shared visual style for every message bubble. */
        .message-bubble {
            border: 1px solid #2c3340;
            border-radius: 18px;
            line-height: 1.6;
            max-width: min(80%, 720px);
            padding: 0.95rem 1rem;
            word-break: break-word;
        }

        /* Give user messages the main accent color so they are easy to distinguish. */
        .message-row.user .message-bubble {
            background-color: #2563eb;
            border-color: #2563eb;
            color: #f8fafc;
        }

        /* Keep assistant messages neutral so the layout stays minimal and readable. */
        .message-row.assistant .message-bubble {
            background-color: #151922;
            color: #e5e7eb;
        }

        /* Style headings that may be produced by rendered Markdown in assistant replies. */
        .message-bubble h1,
        .message-bubble h2,
        .message-bubble h3,
        .message-bubble h4 {
            margin-bottom: 0.75rem;
            margin-top: 0;
        }

        /* Give paragraphs comfortable spacing inside assistant message content. */
        .message-bubble p {
            margin-bottom: 0.75rem;
            margin-top: 0;
        }

        /* Remove extra space below the final paragraph in a message. */
        .message-bubble p:last-child {
            margin-bottom: 0;
        }

        /* Make unordered and ordered lists readable when Markdown contains bullets. */
        .message-bubble ul,
        .message-bubble ol {
            margin-bottom: 0.75rem;
            margin-top: 0;
            padding-left: 1.25rem;
        }

        /* Give code blocks and inline code a readable dark surface. */
        .message-bubble code {
            background-color: #1d2330;
            border-radius: 6px;
            padding: 0.1rem 0.3rem;
        }

        /* Make links visible without introducing bright decorative colors. */
        .message-bubble a {
            color: #93c5fd;
        }

        /* Style the temporary thinking state with a lighter tone so it feels unobtrusive. */
        .thinking {
            color: #9ca3af;
        }

        /* Keep the message composer pinned to the bottom of the interface. */
        .composer {
            background-color: #0f1115;
            border-top: 1px solid #262b35;
            bottom: 0;
            padding: 1rem 1.25rem 1.25rem;
            position: sticky;
        }

        /* Place the text box and send button on one line on larger screens. */
        .composer-form {
            display: flex;
            gap: 0.75rem;
        }

        /* Style the message input with a simple dark surface and readable padding. */
        .composer-input {
            background-color: #151922;
            border: 1px solid #2c3340;
            border-radius: 16px;
            color: #f3f4f6;
            flex: 1;
            min-height: 56px;
            padding: 0.95rem 1rem;
            resize: vertical;
        }

        /* Add a clear outline so keyboard users can see which control is focused. */
        .composer-input:focus,
        .send-button:focus {
            outline: 2px solid #60a5fa;
            outline-offset: 2px;
        }

        /* Use the accent color on the Send button because it is the main action. */
        .send-button {
            background-color: #2563eb;
            border: none;
            border-radius: 16px;
            color: #f8fafc;
            cursor: pointer;
            font-weight: 600;
            min-width: 92px;
            padding: 0 1rem;
        }

        /* Dim the button while a request is in progress so the state is obvious. */
        .send-button:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Use subtle helper text to explain the Enter and Shift+Enter behavior. */
        .composer-help {
            color: #9ca3af;
            font-size: 0.85rem;
            margin: 0.6rem 0 0;
        }

        /* On phones, stack the input and button so the layout stays comfortable to use. */
        @media (max-width: 640px) {
            .site-header,
            .chat-log,
            .composer {
                padding-left: 1rem;
                padding-right: 1rem;
            }

            .composer-form {
                flex-direction: column;
            }

            .send-button {
                min-height: 48px;
            }

            .message-bubble {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <header class="site-header">
        <h1 class="app-title">DisasterAI</h1>
        <p class="app-subtitle">Situational awareness chat over seeded RSS and NOAA context.</p>
    </header>

    <main>
        <!-- This section is where every chat message will be inserted by JavaScript. -->
        <section class="chat-log" id="chatLog" aria-label="Conversation history">
            <article class="message-row assistant">
                <div class="message-bubble">
                    <p>Hello. I am ready to answer questions about the seeded situational awareness data.</p>
                </div>
            </article>
        </section>

        <!-- This bottom composer stays visible so the user can always send another message. -->
        <section class="composer" aria-label="Message composer">
            <form class="composer-form" id="chatForm">
                <textarea
                    aria-label="Message"
                    class="composer-input"
                    id="messageInput"
                    name="message"
                    placeholder="Ask about alerts, locations, flooding, storms, or current signals..."
                    rows="1"
                ></textarea>
                <button class="send-button" id="sendButton" type="submit">Send</button>
            </form>
            <p class="composer-help">Press Enter to send. Press Shift + Enter for a new line.</p>
        </section>
    </main>
</div>

<!-- Load marked.js from a CDN so assistant replies can render Markdown into HTML. -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    // Look up the important page elements once so the functions below can reuse them easily.
    var chatForm = document.getElementById("chatForm");
    var chatLog = document.getElementById("chatLog");
    var messageInput = document.getElementById("messageInput");
    var sendButton = document.getElementById("sendButton");

    // This variable stores the temporary "Thinking..." row while the app waits for the server.
    var thinkingRow = null;

    // Tell marked to treat line breaks in a friendly way for chat responses.
    marked.setOptions({
        breaks: true,
        gfm: true
    });

    // Scroll to the newest message whenever the conversation grows.
    function scrollChatToBottom() {
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    // Create a new chat row and add it to the conversation.
    // The role decides whether the bubble appears on the left or the right.
    // The renderMarkdown flag tells us whether to render plain text or Markdown HTML.
    function addMessage(role, content, renderMarkdown) {
        var row = document.createElement("article");
        var bubble = document.createElement("div");

        row.className = "message-row " + role;
        bubble.className = "message-bubble";

        if (renderMarkdown) {
            bubble.innerHTML = marked.parse(content);
        } else {
            bubble.textContent = content;
        }

        row.appendChild(bubble);
        chatLog.appendChild(row);
        scrollChatToBottom();
        return row;
    }

    // Add a temporary assistant message so the user knows the request is still running.
    function showThinkingIndicator() {
        thinkingRow = document.createElement("article");
        thinkingRow.className = "message-row assistant";

        var bubble = document.createElement("div");
        bubble.className = "message-bubble thinking";
        bubble.textContent = "Thinking...";

        thinkingRow.appendChild(bubble);
        chatLog.appendChild(thinkingRow);
        scrollChatToBottom();
    }

    // Remove the temporary thinking message after the request completes or fails.
    function hideThinkingIndicator() {
        if (thinkingRow) {
            thinkingRow.remove();
            thinkingRow = null;
        }
    }

    // Disable or enable the input controls so users cannot send overlapping requests.
    function setComposerState(isBusy) {
        messageInput.disabled = isBusy;
        sendButton.disabled = isBusy;

        if (!isBusy) {
            messageInput.focus();
        }
    }

    // Send the user's message to the Flask backend and render the assistant reply.
    async function submitMessage(event) {
        event.preventDefault();

        var message = messageInput.value.trim();

        if (message.length === 0) {
            return;
        }

        addMessage("user", message, false);
        messageInput.value = "";
        setComposerState(true);
        showThinkingIndicator();

        try {
            var response = await fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: message })
            });

            var payload = await response.json();

            if (!response.ok) {
                throw new Error(payload.error || "The server returned an unexpected error.");
            }

            hideThinkingIndicator();
            addMessage("assistant", payload.reply, true);
        } catch (error) {
            hideThinkingIndicator();
            addMessage("assistant", "Unable to get a reply.\n\n" + error.message, true);
        } finally {
            setComposerState(false);
        }
    }

    // Let Enter send the message, while Shift + Enter still inserts a new line.
    function handleComposerKeydown(event) {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            chatForm.requestSubmit();
        }
    }

    // Connect the form and textarea to the behavior defined above.
    chatForm.addEventListener("submit", submitMessage);
    messageInput.addEventListener("keydown", handleComposerKeydown);

    // Focus the input when the page loads so the user can start typing immediately.
    messageInput.focus();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DisasterAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Prevent flash of wrong theme -->
    <script>
        (function() {
            var stored = localStorage.getItem("theme");
            var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            var theme = stored || (prefersDark ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>

    <style>
        /* ── Theme tokens ── */
        :root,
        [data-theme="light"] {
            --bg-page: #f8f9fb;
            --bg-sidebar: #ffffff;
            --bg-surface: #ffffff;
            --bg-surface-hover: #f3f4f6;
            --bg-input: #f3f4f6;
            --bg-code: #f3f4f6;
            --bg-code-block: #1e1e2e;
            --bg-user-bubble: #6366f1;
            --bg-assistant-bubble: #ffffff;
            --border-main: #e8eaed;
            --border-light: #e5e7eb;
            --border-assistant: #e8eaed;
            --text-primary: #1a1a2e;
            --text-secondary: #4b5563;
            --text-muted: #6b7280;
            --text-faint: #9ca3af;
            --text-on-accent: #ffffff;
            --text-code-block: #cdd6f4;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-bg: #f0f0ff;
            --accent-text: #4f46e5;
            --shadow-sm: rgba(0,0,0,0.04);
            --shadow-md: rgba(0,0,0,0.06);
            --scrollbar-thumb: #d1d5db;
            --scrollbar-hover: #9ca3af;
            --kbd-bg: #ffffff;
            --thinking-sheen: rgba(99, 102, 241, 0.06);
        }

        [data-theme="dark"] {
            --bg-page: #0f1117;
            --bg-sidebar: #161822;
            --bg-surface: #1c1e2e;
            --bg-surface-hover: #262840;
            --bg-input: #1c1e2e;
            --bg-code: #262840;
            --bg-code-block: #0d0e18;
            --bg-user-bubble: #6366f1;
            --bg-assistant-bubble: #1c1e2e;
            --border-main: #2a2d40;
            --border-light: #2a2d40;
            --border-assistant: #2a2d40;
            --text-primary: #e2e4f0;
            --text-secondary: #a0a3b8;
            --text-muted: #7b7f96;
            --text-faint: #5c6078;
            --text-on-accent: #ffffff;
            --text-code-block: #cdd6f4;
            --accent: #818cf8;
            --accent-hover: #6366f1;
            --accent-bg: rgba(99, 102, 241, 0.15);
            --accent-text: #a5b4fc;
            --shadow-sm: rgba(0,0,0,0.2);
            --shadow-md: rgba(0,0,0,0.3);
            --scrollbar-thumb: #3a3d52;
            --scrollbar-hover: #5c6078;
            --kbd-bg: #262840;
            --thinking-sheen: rgba(129, 140, 248, 0.08);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }

        body {
            background-color: var(--bg-page);
            color: var(--text-primary);
            font-family: "Inter", system-ui, sans-serif;
            display: flex;
            overflow: hidden;
            transition: background-color 0.25s, color 0.25s;
        }

        /* ── Sidebar ── */
        .sidebar {
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 1.25rem 1rem;
            width: 260px;
            flex-shrink: 0;
            overflow: hidden;
            transition: background 0.25s, border-color 0.25s;
        }

        .brand {
            align-items: center;
            display: flex;
            gap: 0.55rem;
            margin-bottom: 1.5rem;
        }

        .brand-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon svg { width: 16px; height: 16px; }

        .brand-name {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .search-box {
            align-items: center;
            background: var(--bg-input);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            padding: 0.55rem 0.75rem;
            cursor: text;
            transition: background 0.25s, border-color 0.25s;
        }

        .search-box svg { color: var(--text-faint); flex-shrink: 0; }

        .search-box input {
            background: transparent;
            border: none;
            color: var(--text-muted);
            flex: 1;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
        }

        .search-box .kbd {
            background: var(--kbd-bg);
            border: 1px solid var(--border-light);
            border-radius: 5px;
            color: var(--text-faint);
            font-size: 0.7rem;
            padding: 0.1rem 0.4rem;
            transition: background 0.25s, border-color 0.25s;
        }

        .history-group { flex: 1; min-height: 0; display: flex; flex-direction: column; margin-bottom: 1rem; }

        .history-header {
            align-items: center;
            background: var(--bg-surface-hover);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 0;
            padding: 0.55rem 0.75rem;
            transition: background 0.15s, border-color 0.15s;
            user-select: none;
        }

        .history-header:hover { background: var(--bg-input); }

        .history-header-left {
            align-items: center;
            display: flex;
            gap: 0.55rem;
        }

        .history-chevron {
            color: var(--text-faint);
            transition: transform 0.25s ease;
            flex-shrink: 0;
        }

        .history-header.open .history-chevron { transform: rotate(180deg); }

        .history-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0;
        }

        .history-count {
            background: var(--accent-bg);
            border-radius: 999px;
            color: var(--accent-text);
            font-size: 0.7rem;
            font-weight: 600;
            min-width: 18px;
            padding: 0.05rem 0.45rem;
            text-align: center;
        }

        .history-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, margin-top 0.25s ease;
            margin-top: 0;
        }

        .history-body.open {
            max-height: 600px;
            margin-top: 0.4rem;
            overflow-y: auto;
        }

        .history-item {
            align-items: center;
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            font-size: 0.85rem;
            gap: 0.5rem;
            padding: 0.45rem 0.75rem;
            text-overflow: ellipsis;
            transition: background 0.15s, color 0.15s;
        }

        .history-item:hover { background: var(--bg-surface-hover); color: var(--text-primary); }
        .history-item.active { background: var(--accent-bg); color: var(--accent-text); }

        .history-item-title {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-item-delete {
            color: inherit;
            flex-shrink: 0;
            opacity: 0;
            padding: 0.25rem;
        }

        .history-item:hover .history-item-delete,
        .history-item.active .history-item-delete,
        .history-item-delete:focus-visible {
            opacity: 1;
        }

        .history-item-delete:hover { background: var(--bg-surface); }

        .history-title-input {
            background: transparent;
            border: none;
            color: inherit;
            flex: 1;
            font-family: inherit;
            font-size: inherit;
            min-width: 0;
            outline: none;
        }

        .history-empty {
            color: var(--text-faint);
            font-size: 0.82rem;
            padding: 0.45rem 0.75rem;
        }

        .history-create-btn {
            color: var(--text-faint);
            flex-shrink: 0;
            padding: 0.35rem;
        }

        /* ── Theme toggle ── */
        .sidebar-footer {
            margin-top: auto;
            padding-top: 1rem;
        }

        .theme-toggle {
            align-items: center;
            background: var(--bg-input);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            gap: 0.55rem;
            padding: 0.55rem 0.75rem;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            width: 100%;
        }

        .theme-toggle:hover { background: var(--bg-surface-hover); color: var(--text-primary); }
        .theme-toggle svg { width: 18px; height: 18px; flex-shrink: 0; }

        .theme-toggle .icon-sun,
        .theme-toggle .label-light { display: none; }

        [data-theme="dark"] .theme-toggle .icon-sun,
        [data-theme="dark"] .theme-toggle .label-light { display: inline; }

        [data-theme="dark"] .theme-toggle .icon-moon,
        [data-theme="dark"] .theme-toggle .label-dark { display: none; }

        /* ── Main area ── */
        .main {
            display: flex;
            flex: 1;
            flex-direction: column;
            height: 100vh;
            min-width: 0;
            position: relative;
        }

        .topbar {
            align-items: center;
            display: flex;
            justify-content: center;
            padding: 1rem 1.5rem;
        }

        .model-pill {
            align-items: center;
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-radius: 999px;
            box-shadow: 0 1px 3px var(--shadow-sm);
            cursor: pointer;
            display: inline-flex;
            font-size: 0.88rem;
            font-weight: 600;
            gap: 0.45rem;
            padding: 0.5rem 1rem;
            color: var(--text-primary);
            transition: background 0.25s, border-color 0.15s, color 0.25s;
        }

        .model-pill:hover { border-color: var(--text-faint); }

        .model-pill .dot {
            background: linear-gradient(135deg, #6366f1, #818cf8);
            border-radius: 50%;
            height: 20px;
            width: 20px;
        }

        .model-pill svg { width: 14px; height: 14px; color: var(--text-faint); }

        /* ── Welcome state ── */
        .welcome {
            align-items: center;
            display: flex;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            padding: 2rem;
            gap: 1.5rem;
        }

        .welcome-orb {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #c7d2fe, #a5b4fc 40%, #818cf8 70%, #6366f1);
            filter: blur(1px);
            box-shadow: 0 8px 40px rgba(99, 102, 241, 0.25);
            animation: orb-float 5s ease-in-out infinite;
        }

        @keyframes orb-float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.04); }
        }

        .welcome-heading {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.3;
            text-align: center;
            color: var(--text-primary);
        }

        .welcome-heading .accent { color: var(--accent); }

        /* ── Chat state ── */
        .chat-area {
            display: none;
            flex: 1;
            flex-direction: column;
            min-height: 0;
        }

        .chat-area.active { display: flex; }

        .chat-log {
            display: flex;
            flex: 1;
            flex-direction: column;
            gap: 1rem;
            min-height: 0;
            overflow-y: auto;
            padding: 1.5rem 2rem;
        }

        .message-row { display: flex; width: 100%; }
        .message-row.user { justify-content: flex-end; }
        .message-row.assistant { justify-content: flex-start; }

        .message-bubble {
            border-radius: 18px;
            line-height: 1.65;
            max-width: min(75%, 680px);
            padding: 0.85rem 1.1rem;
            word-break: break-word;
            font-size: 0.94rem;
        }

        .message-row.user .message-bubble {
            background: var(--bg-user-bubble);
            color: var(--text-on-accent);
        }

        .message-row.assistant .message-bubble {
            background: var(--bg-assistant-bubble);
            border: 1px solid var(--border-assistant);
            color: var(--text-primary);
            transition: background 0.25s, border-color 0.25s, color 0.25s;
        }

        .message-bubble h1, .message-bubble h2, .message-bubble h3, .message-bubble h4 {
            margin: 0 0 0.5rem;
        }
        .message-bubble p { margin: 0 0 0.6rem; }
        .message-bubble p:last-child { margin-bottom: 0; }
        .message-bubble ul, .message-bubble ol { margin: 0 0 0.6rem; padding-left: 1.25rem; }
        .message-bubble code {
            background: var(--bg-code);
            border-radius: 5px;
            font-size: 0.85em;
            padding: 0.12rem 0.35rem;
            transition: background 0.25s;
        }
        .message-bubble pre {
            background: var(--bg-code-block);
            border-radius: 10px;
            color: var(--text-code-block);
            font-size: 0.83rem;
            margin: 0.5rem 0;
            overflow-x: auto;
            padding: 0.9rem 1rem;
        }
        .message-bubble pre code {
            background: transparent;
            color: inherit;
            padding: 0;
        }
        .message-bubble a { color: var(--accent); }

        /* ── Typing cursor ── */
        .typing-cursor {
            animation: cursor-blink 0.65s ease-in-out infinite;
            background: var(--text-muted);
            border-radius: 1px;
            display: inline-block;
            height: 1.1em;
            margin-left: 2px;
            vertical-align: text-bottom;
            width: 2px;
        }

        @keyframes cursor-blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        /* ── Thinking indicator ── */
        .thinking {
            background: var(--bg-assistant-bubble);
            border: 1px solid var(--border-assistant);
            box-shadow: 0 2px 12px var(--shadow-sm);
            display: inline-flex;
            flex-direction: column;
            gap: 0;
            min-width: 240px;
            overflow: hidden;
            position: relative;
        }

        .thinking-main {
            align-items: center;
            display: flex;
            gap: 0.75rem;
        }

        .thinking::before {
            animation: thinking-sheen 2.8s linear infinite;
            background: linear-gradient(115deg, transparent 25%, var(--thinking-sheen) 50%, transparent 75%);
            content: "";
            inset: 0;
            position: absolute;
            transform: translateX(-100%);
        }

        .thinking > * { position: relative; z-index: 1; }

        .thinking-visual { align-items: center; display: flex; gap: 0.5rem; }

        .thinking-orb {
            animation: thinking-pulse 1.8s ease-in-out infinite;
            background: radial-gradient(circle at 30% 30%, #c7d2fe, #818cf8 55%, #4f46e5 100%);
            border-radius: 50%;
            height: 12px;
            width: 12px;
            flex-shrink: 0;
        }

        .thinking-dots { align-items: flex-end; display: flex; gap: 0.25rem; height: 14px; }

        .thinking-dot {
            animation: thinking-dot-bounce 1s ease-in-out infinite;
            background: #a5b4fc;
            border-radius: 50%;
            height: 5px;
            opacity: 0.5;
            width: 5px;
        }
        .thinking-dot:nth-child(2) { animation-delay: 0.15s; }
        .thinking-dot:nth-child(3) { animation-delay: 0.3s; }

        .thinking-copy { display: grid; gap: 0.05rem; }
        .thinking-label { color: var(--text-primary); font-size: 0.9rem; font-weight: 600; }
        .thinking-caption { color: var(--text-faint); font-size: 0.75rem; }

        @keyframes thinking-dot-bounce {
            0%, 80%, 100% { opacity: 0.4; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-4px); }
        }

        @keyframes thinking-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.2); transform: scale(1); }
            50% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); transform: scale(1.1); }
        }

        @keyframes thinking-sheen {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }

        /* ── Thinking steps ── */
        .thinking-steps {
            border-top: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-top: 0.7rem;
            padding-top: 0.6rem;
        }

        .thinking-step {
            align-items: center;
            display: flex;
            font-size: 0.8rem;
            gap: 0.5rem;
        }

        .thinking-step-dot {
            border-radius: 50%;
            flex-shrink: 0;
            height: 7px;
            width: 7px;
            transition: background 0.3s;
        }

        .thinking-step.running .thinking-step-dot {
            animation: step-pulse 1s ease-in-out infinite;
            background: var(--accent);
        }

        .thinking-step.done .thinking-step-dot {
            animation: none;
            background: #22c55e;
        }

        @keyframes step-pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .thinking-step-label {
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .thinking-step.done .thinking-step-label {
            color: var(--text-secondary);
        }

        .thinking-step-check {
            color: #22c55e;
            font-size: 0.7rem;
            margin-left: auto;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .thinking-step.done .thinking-step-check { opacity: 1; }

        @media (prefers-reduced-motion: reduce) {
            .thinking::before, .thinking-orb, .thinking-dot, .welcome-orb,
            .thinking-step-dot, .typing-cursor { animation: none; }
        }

        /* ── Composer ── */
        .composer-wrap { padding: 0 2rem 1.5rem; }

        .composer {
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-radius: 18px;
            box-shadow: 0 2px 12px var(--shadow-sm);
            max-width: 700px;
            margin: 0 auto;
            overflow: hidden;
            transition: background 0.25s, border-color 0.25s;
        }

        .composer-input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            display: block;
            font-family: inherit;
            font-size: 0.92rem;
            min-height: 80px;
            outline: none;
            padding: 1rem 1.15rem 0.5rem;
            resize: none;
            width: 100%;
        }

        .composer-input::placeholder { color: var(--text-faint); }

        .composer-bottom {
            align-items: center;
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem 0.85rem 0.75rem;
        }

        .chip-btn {
            align-items: center;
            background: var(--bg-input);
            border: 1px solid var(--border-light);
            border-radius: 999px;
            color: var(--text-secondary);
            cursor: pointer;
            display: inline-flex;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 500;
            gap: 0.35rem;
            padding: 0.38rem 0.85rem;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }

        .chip-btn:hover { background: var(--bg-surface-hover); border-color: var(--text-faint); }
        .chip-btn svg { width: 14px; height: 14px; }

        .icon-btn {
            align-items: center;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            display: inline-flex;
            justify-content: center;
            padding: 0.4rem;
            transition: background 0.15s;
        }

        .icon-btn:hover { background: var(--bg-surface-hover); }
        .icon-btn svg { width: 18px; height: 18px; }

        .composer-spacer { flex: 1; }

        .send-btn {
            align-items: center;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            display: inline-flex;
            justify-content: center;
            padding: 0.45rem 0.55rem;
            transition: background 0.15s, opacity 0.15s;
        }

        .send-btn:hover { background: var(--accent-hover); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .send-btn svg { width: 18px; height: 18px; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .composer-wrap { padding: 0 1rem 1rem; }
            .chat-log { padding: 1rem; }
            .message-bubble { max-width: 90%; }
            .welcome-heading { font-size: 1.5rem; }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }
    </style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside class="sidebar">
    <div class="brand">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
        </div>
        <span class="brand-name">DisasterAI</span>
    </div>

    <div class="history-group">
        <div class="history-header open" id="historyToggle" role="button" aria-expanded="true" aria-controls="historyBody">
            <div class="history-header-left">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" color="var(--text-muted)">
                    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
                <span class="history-label">Chat History</span>
                <span class="history-count" id="historyCount">0</span>
            </div>
            <div style="display:flex;align-items:center;gap:0.35rem;">
                <button class="icon-btn history-create-btn" id="newSessionButton" type="button" title="New chat" onclick="event.stopPropagation()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                </button>
                <svg class="history-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </div>
        </div>
        <div class="history-body open" id="historyBody" aria-label="Saved chat sessions">
            <div id="sessionList"></div>
            <div class="history-empty" id="sessionEmptyState">No saved chats yet.</div>
        </div>
    </div>

    <!-- Theme toggle at bottom of sidebar -->
    <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" type="button">
            <!-- Moon icon (shown in light mode → click to go dark) -->
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <!-- Sun icon (shown in dark mode → click to go light) -->
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <span class="label-dark">Dark Mode</span>
            <span class="label-light">Light Mode</span>
        </button>
    </div>
</aside>

<!-- ── Main Content ── -->
<div class="main">
    <div class="topbar">
        <div class="model-pill">
            <span class="dot"></span>
            DisasterAI Gemini
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        </div>
    </div>

    <!-- Welcome screen (shown before first message) -->
    <div class="welcome" id="welcomeScreen">
        <div class="welcome-orb"></div>
        <h1 class="welcome-heading">
            Good Morning<br>
            How Can I <span class="accent">Assist You Today?</span>
        </h1>
    </div>

    <!-- Chat area (shown after first message) -->
    <div class="chat-area" id="chatArea">
        <section class="chat-log" id="chatLog" aria-label="Conversation history"></section>
    </div>

    <!-- Composer -->
    <div class="composer-wrap">
        <form class="composer" id="chatForm">
            <textarea
                class="composer-input"
                id="messageInput"
                placeholder="Initiate a query or send a command to the AI..."
                rows="2"
                aria-label="Message"
            ></textarea>
            <div class="composer-bottom">

<span class="composer-spacer"></span>
                <button type="submit" class="send-btn" id="sendButton" title="Send message">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    var chatForm = document.getElementById("chatForm");
    var chatLog = document.getElementById("chatLog");
    var messageInput = document.getElementById("messageInput");
    var sendButton = document.getElementById("sendButton");
    var welcomeScreen = document.getElementById("welcomeScreen");
    var chatArea = document.getElementById("chatArea");
    var themeToggle = document.getElementById("themeToggle");
    var sessionList = document.getElementById("sessionList");
    var sessionEmptyState = document.getElementById("sessionEmptyState");
    var newSessionButton = document.getElementById("newSessionButton");

    var thinkingRow = null;
    var firstMessage = true;
    var sessions = [];
    var currentSessionId = null;
    var isSubmitting = false;

    marked.setOptions({ breaks: true, gfm: true });

    // ── Theme toggle ──
    function getTheme() {
        return document.documentElement.getAttribute("data-theme") || "light";
    }

    function setTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
    }

    themeToggle.addEventListener("click", function() {
        setTheme(getTheme() === "light" ? "dark" : "light");
    });

    // Follow OS changes if user hasn't manually chosen
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function(e) {
        if (!localStorage.getItem("theme")) {
            setTheme(e.matches ? "dark" : "light");
        }
    });

    // ── Greeting ──
    (function updateGreeting() {
        var h = new Date().getHours();
        var greeting = h < 12 ? "Good Morning" : h < 18 ? "Good Afternoon" : "Good Evening";
        var heading = document.querySelector(".welcome-heading");
        if (heading) {
            heading.innerHTML = greeting + '<br>How Can I <span class="accent">Assist You Today?</span>';
        }
    })();

    function scrollChatToBottom() {
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    function sortSessions(list) {
        return list.slice().sort(function(a, b) {
            return new Date(b.updated_at) - new Date(a.updated_at);
        });
    }

    function findSession(sessionId) {
        return sessions.find(function(session) {
            return session.id === sessionId;
        }) || null;
    }

    function upsertSession(session) {
        if (!session) return;
        var index = sessions.findIndex(function(item) {
            return item.id === session.id;
        });

        if (index === -1) {
            sessions.push(session);
        } else {
            sessions[index] = session;
        }

        sessions = sortSessions(sessions);
        renderSessions();
    }

    function removeSession(sessionId) {
        sessions = sessions.filter(function(session) {
            return session.id !== sessionId;
        });
        renderSessions();
    }

    function resetConversation() {
        hideThinkingIndicator();
        chatLog.innerHTML = "";
        chatArea.classList.remove("active");
        welcomeScreen.style.display = "flex";
        firstMessage = true;
    }

    function switchToChat() {
        if (firstMessage) {
            welcomeScreen.style.display = "none";
            chatArea.classList.add("active");
            firstMessage = false;
        }
    }

    function addMessage(role, content, renderMarkdown) {
        switchToChat();
        var row = document.createElement("article");
        var bubble = document.createElement("div");
        row.className = "message-row " + role;
        bubble.className = "message-bubble";

        if (renderMarkdown) {
            bubble.innerHTML = marked.parse(content);
        } else {
            bubble.textContent = content;
        }

        row.appendChild(bubble);
        chatLog.appendChild(row);
        scrollChatToBottom();
        return row;
    }

    function renderMessages(messages) {
        hideThinkingIndicator();
        chatLog.innerHTML = "";

        if (!messages.length) {
            resetConversation();
            return;
        }

        messages.forEach(function(message) {
            addMessage(message.role, message.content, message.role === "assistant");
        });
    }

    var thinkingSteps = {};

    function showThinkingIndicator() {
        switchToChat();
        thinkingRow = document.createElement("article");
        thinkingRow.className = "message-row assistant";

        var bubble = document.createElement("div");
        bubble.className = "message-bubble thinking";
        bubble.setAttribute("role", "status");
        bubble.setAttribute("aria-live", "polite");
        bubble.innerHTML = [
            '<div class="thinking-main">',
            '  <div class="thinking-visual" aria-hidden="true">',
            '    <span class="thinking-orb"></span>',
            '    <div class="thinking-dots">',
            '      <span class="thinking-dot"></span>',
            '      <span class="thinking-dot"></span>',
            '      <span class="thinking-dot"></span>',
            '    </div>',
            '  </div>',
            '  <div class="thinking-copy">',
            '    <span class="thinking-label">Thinking</span>',
            '    <span class="thinking-caption">Analyzing context and preparing a reply.</span>',
            '  </div>',
            '</div>'
        ].join("");

        thinkingRow.appendChild(bubble);
        chatLog.appendChild(thinkingRow);
        scrollChatToBottom();
    }

    function addThinkingStep(name, label) {
        if (!thinkingRow) return;
        var bubble = thinkingRow.querySelector(".message-bubble");
        var stepsEl = bubble.querySelector(".thinking-steps");
        if (!stepsEl) {
            stepsEl = document.createElement("div");
            stepsEl.className = "thinking-steps";
            bubble.appendChild(stepsEl);
        }
        var step = document.createElement("div");
        step.className = "thinking-step running";
        step.innerHTML = [
            '<span class="thinking-step-dot"></span>',
            '<span class="thinking-step-label">' + label + '…</span>',
            '<span class="thinking-step-check">✓</span>'
        ].join("");
        stepsEl.appendChild(step);
        thinkingSteps[name] = step;
        scrollChatToBottom();
    }

    function completeThinkingStep(name) {
        var step = thinkingSteps[name];
        if (step) {
            step.classList.remove("running");
            step.classList.add("done");
            step.querySelector(".thinking-step-label").textContent =
                step.querySelector(".thinking-step-label").textContent.replace("…", "");
        }
    }

    function hideThinkingIndicator() {
        if (thinkingRow) {
            thinkingRow.remove();
            thinkingRow = null;
        }
        thinkingSteps = {};
    }

    function setComposerState(isBusy) {
        messageInput.disabled = isBusy;
        sendButton.disabled = isBusy;
        newSessionButton.disabled = isBusy;
        if (!isBusy) messageInput.focus();
    }

    async function requestJson(url, options) {
        var response = await fetch(url, options);
        var payload = {};

        try {
            payload = await response.json();
        } catch (error) {
            payload = {};
        }

        if (!response.ok) {
            throw new Error(payload.error || "The server returned an unexpected error.");
        }

        return payload;
    }

    // ── History toggle ──
    var historyToggle = document.getElementById("historyToggle");
    var historyBody = document.getElementById("historyBody");
    var historyCount = document.getElementById("historyCount");

    historyToggle.addEventListener("click", function() {
        var isOpen = historyToggle.classList.toggle("open");
        historyBody.classList.toggle("open", isOpen);
        historyToggle.setAttribute("aria-expanded", isOpen);
    });

    function renderSessions() {
        sessionList.innerHTML = "";
        sessionEmptyState.style.display = sessions.length ? "none" : "block";
        historyCount.textContent = sessions.length;

        sessions.forEach(function(session) {
            var item = document.createElement("div");
            var title = document.createElement("span");
            var deleteButton = document.createElement("button");

            item.className = "history-item";
            if (session.id === currentSessionId) {
                item.classList.add("active");
            }
            item.tabIndex = 0;
            item.setAttribute("role", "button");
            item.setAttribute("aria-label", "Load session " + session.title);

            title.className = "history-item-title";
            title.textContent = session.title;

            deleteButton.className = "icon-btn history-item-delete";
            deleteButton.type = "button";
            deleteButton.title = "Delete chat";
            deleteButton.innerHTML = [
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">',
                '  <polyline points="3 6 5 6 21 6"></polyline>',
                '  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>',
                '  <path d="M10 11v6"></path>',
                '  <path d="M14 11v6"></path>',
                '  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>',
                '</svg>'
            ].join("");

            item.addEventListener("click", function() {
                loadSession(session.id);
            });

            item.addEventListener("keydown", function(event) {
                if (event.key === "Enter" || event.key === " ") {
                    event.preventDefault();
                    loadSession(session.id);
                }
            });

            title.addEventListener("dblclick", function(event) {
                event.stopPropagation();
                beginRenameSession(session, item, title);
            });

            deleteButton.addEventListener("click", function(event) {
                event.stopPropagation();
                handleDeleteSession(session.id);
            });

            item.appendChild(title);
            item.appendChild(deleteButton);
            sessionList.appendChild(item);
        });
    }

    function beginRenameSession(session, item, titleNode) {
        if (isSubmitting) return;
        if (item.querySelector(".history-title-input")) return;

        var input = document.createElement("input");
        input.className = "history-title-input";
        input.type = "text";
        input.value = session.title;

        function restoreTitle() {
            if (input.parentNode === item) {
                item.replaceChild(titleNode, input);
            }
        }

        async function commitRename() {
            var nextTitle = input.value.trim();
            restoreTitle();
            if (!nextTitle || nextTitle === session.title) return;

            try {
                var payload = await requestJson("/sessions/" + encodeURIComponent(session.id), {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ title: nextTitle })
                });
                upsertSession(payload.session);
            } catch (error) {
                alert(error.message);
            }
        }

        input.addEventListener("click", function(event) {
            event.stopPropagation();
        });

        input.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                input.blur();
            }
            if (event.key === "Escape") {
                restoreTitle();
            }
        });

        input.addEventListener("blur", commitRename);
        item.replaceChild(input, titleNode);
        input.focus();
        input.select();
    }

    async function loadSessions(preferredSessionId) {
        var payload = await requestJson("/sessions");
        sessions = sortSessions(payload.sessions || []);

        if (preferredSessionId && findSession(preferredSessionId)) {
            currentSessionId = preferredSessionId;
        } else if (currentSessionId && !findSession(currentSessionId)) {
            currentSessionId = null;
        }

        renderSessions();
    }

    async function createNewSession(options) {
        options = options || {};
        var payload = await requestJson("/sessions", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({})
        });

        currentSessionId = payload.id;
        upsertSession(payload.session);

        if (options.resetConversation !== false) {
            resetConversation();
        }

        return payload.session;
    }

    async function ensureSession() {
        if (currentSessionId) {
            return currentSessionId;
        }

        var session = await createNewSession({ resetConversation: false });
        if (!session) {
            throw new Error("Unable to create a new session right now.");
        }
        return session.id;
    }

    async function loadSession(sessionId) {
        if (!sessionId || isSubmitting) {
            return;
        }

        var payload = await requestJson("/sessions/" + encodeURIComponent(sessionId));
        currentSessionId = payload.session.id;
        upsertSession(payload.session);
        renderMessages(payload.messages || []);
    }

    async function handleDeleteSession(sessionId) {
        if (isSubmitting) return;
        var existing = findSession(sessionId);
        if (!existing) return;

        if (!window.confirm('Delete "' + existing.title + '"?')) {
            return;
        }

        await requestJson("/sessions/" + encodeURIComponent(sessionId), {
            method: "DELETE"
        });

        removeSession(sessionId);

        if (currentSessionId === sessionId) {
            currentSessionId = null;
            resetConversation();
            if (sessions.length) {
                await loadSession(sessions[0].id);
            }
        }
    }

    async function submitMessage(event) {
        event.preventDefault();
        var message = messageInput.value.trim();
        if (!message || isSubmitting) return;

        isSubmitting = true;
        var assistantBubble = null;
        var rawReply = "";

        try {
            var sessionId = await ensureSession();

            addMessage("user", message, false);
            messageInput.value = "";
            messageInput.style.height = "auto";
            setComposerState(true);
            showThinkingIndicator();

            var response = await fetch("/chat/stream", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message, session_id: sessionId })
            });

            if (!response.ok) {
                var errPayload = await response.json().catch(function() { return {}; });
                throw new Error(errPayload.error || "Server error.");
            }

            var reader = response.body.getReader();
            var decoder = new TextDecoder();
            var buffer = "";

            while (true) {
                var chunk = await reader.read();
                if (chunk.done) break;

                buffer += decoder.decode(chunk.value, { stream: true });

                // Split on double-newline (SSE message boundary)
                var parts = buffer.split("\n\n");
                buffer = parts.pop();

                for (var i = 0; i < parts.length; i++) {
                    var part = parts[i].trim();
                    if (!part) continue;

                    var eventType = "message";
                    var eventData = "";

                    part.split("\n").forEach(function(line) {
                        if (line.startsWith("event: ")) eventType = line.slice(7).trim();
                        else if (line.startsWith("data: ")) eventData = line.slice(6).trim();
                    });

                    if (!eventData) continue;
                    var data = JSON.parse(eventData);

                    if (eventType === "tool_call") {
                        addThinkingStep(data.name, data.label);

                    } else if (eventType === "tool_done") {
                        completeThinkingStep(data.name);

                    } else if (eventType === "text") {
                        if (!assistantBubble) {
                            hideThinkingIndicator();
                            switchToChat();
                            var row = document.createElement("article");
                            row.className = "message-row assistant";
                            var bubble = document.createElement("div");
                            bubble.className = "message-bubble";
                            row.appendChild(bubble);
                            chatLog.appendChild(row);
                            assistantBubble = bubble;
                        }
                        rawReply += data.chunk;
                        assistantBubble.textContent = rawReply;
                        var cursor = document.createElement("span");
                        cursor.className = "typing-cursor";
                        assistantBubble.appendChild(cursor);
                        scrollChatToBottom();

                    } else if (eventType === "done") {
                        if (assistantBubble) {
                            assistantBubble.innerHTML = marked.parse(rawReply);
                        }
                        currentSessionId = data.session_id;
                        upsertSession(data.session);
                        scrollChatToBottom();

                    } else if (eventType === "error") {
                        hideThinkingIndicator();
                        addMessage("assistant", "Error: " + data.error, false);
                    }
                }
            }

            // Fallback: if stream ended without a done event but we have content
            if (assistantBubble && rawReply) {
                assistantBubble.innerHTML = marked.parse(rawReply);
            }

        } catch (error) {
            hideThinkingIndicator();
            addMessage("assistant", "Unable to get a reply.\n\n" + error.message, true);
        } finally {
            isSubmitting = false;
            setComposerState(false);
        }
    }

    function handleComposerKeydown(event) {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            chatForm.requestSubmit();
        }
    }

    messageInput.addEventListener("input", function() {
        this.style.height = "auto";
        this.style.height = Math.min(this.scrollHeight, 160) + "px";
    });

    chatForm.addEventListener("submit", submitMessage);
    messageInput.addEventListener("keydown", handleComposerKeydown);
    newSessionButton.addEventListener("click", function() {
        if (isSubmitting) return;
        createNewSession();
    });

    loadSessions()
        .then(function() {
            if (sessions.length) {
                return loadSession(sessions[0].id);
            }
            resetConversation();
        })
        .catch(function(error) {
            addMessage("assistant", "Unable to load chat sessions.\n\n" + error.message, true);
        })
        .finally(function() {
            messageInput.focus();
        });
</script>
</body>
</html>
